<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osorno Servicios</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background-color: #f4f6f9; color: #333; }
        header { background-color: #1e3a8a; color: white; padding: 20px; text-align: center; font-size: 22px; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .sub-header { background-color: #3b82f6; color: white; text-align: center; padding: 6px; font-size: 13px; font-weight: 500; }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .intro { text-align: center; margin-bottom: 20px; font-size: 15px; color: #666; }
        
        /* Contenedor de botones en cuadrícula (2 columnas) */
        .grid-categorias { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 10px; }
        
        /* Estilo de cada botón de categoría */
        .card-categoria { background: white; border: none; padding: 25px 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); text-align: center; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; -webkit-tap-highlight-color: transparent; }
        .card-categoria:active { transform: scale(0.95); background-color: #f0f4ff; }
        .card-categoria .icono { font-size: 32px; margin-bottom: 10px; display: block; }
        .card-categoria .nombre { font-size: 16px; font-weight: bold; color: #1e3a8a; }
    </style>
</head>
<body>

    <header>🛠️ Osorno Servicios</header>
    <div class="sub-header">📍 Soluciones del Hogar en Osorno</div>
    
    <div class="container">
        <p class="intro">¿Qué servicio necesitas hoy? Elige una categoría para ver profesionales disponibles:</p>
        
        <div class="grid-categorias">
            <!-- Botón Gasfitería -->
            <button class="card-categoria" onclick="alert('Próximamente verás la lista de Gasfiters')">
                <span class="icono">🚰</span>
                <span class="nombre">Gasfitería</span>
            </button>
            
            <!-- Botón Electricidad -->
            <button class="card-categoria" onclick="alert('Próximamente verás la lista de Electricistas')">
                <span class="icono">⚡</span>
                <span class="nombre">Electricistas</span>
            </button>
            
            <!-- Botón Construcción -->
            <button class="card-categoria" onclick="alert('Próximamente verás la lista de Maestros de Construcción')">
                <span class="icono">🧱</span>
                <span class="nombre">Construcción</span>
            </button>
            
            <!-- Botón Limpieza y Estufas -->
            <button class="card-categoria" onclick="alert('Próximamente verás la lista de Limpieza y Combustión')">
                <span class="icono">🔥</span>
                <span class="nombre">Ductos y Estufas</span>
            </button>
        </div>
    </div>

</body>
</html>
